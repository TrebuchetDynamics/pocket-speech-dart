name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: flutter analyze
      - run: dart format --output=none --set-exit-if-changed lib test integration_test example
      - run: flutter build linux --debug
      - run: flutter test
      - run: python3 -m unittest discover -s test -p '*_python_test.py'
      - run: flutter pub publish --dry-run
