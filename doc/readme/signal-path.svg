<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="390" viewBox="0 0 1200 390" role="img" aria-labelledby="title desc">
  <title id="title">Pocket Speech local synthesis path</title>
  <desc id="desc">Text passes through the built-in phonemizer, a selected Kokoro or KittenTTS model, local ONNX Runtime inference, and becomes PocketSpeechAudio with PCM16 or WAV output.</desc>

  <rect width="1200" height="390" rx="24" fill="#081018"/>
  <text x="56" y="57" fill="#F5FAFC" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="34" font-weight="700">One API, two local model families</text>
  <text x="56" y="88" fill="#7895A4" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="15" letter-spacing="1">TEXT → PHONEMES → INFERENCE → AUDIO BYTES</text>

  <g id="input" transform="translate(56 137)">
    <rect width="190" height="116" rx="14" fill="#0E202A" stroke="#2B5364" stroke-width="2"/>
    <text x="20" y="31" fill="#7895A4" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12" letter-spacing="1">01 / INPUT</text>
    <text x="20" y="66" fill="#F5FAFC" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="22" font-weight="650">App text</text>
    <text x="20" y="94" fill="#A9C0CA" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13">EN-US · EN-GB · ES</text>
  </g>

  <path d="M246 195H282" stroke="#3A6576" stroke-width="3"/>
  <path d="M274 188L282 195L274 202" fill="none" stroke="#3A6576" stroke-width="3"/>

  <g id="phonemizer" transform="translate(282 137)">
    <rect width="190" height="116" rx="14" fill="#0E202A" stroke="#2B5364" stroke-width="2"/>
    <text x="20" y="31" fill="#7895A4" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12" letter-spacing="1">02 / SHAPE</text>
    <text x="20" y="66" fill="#F5FAFC" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="22" font-weight="650">Phonemizer</text>
    <text x="20" y="94" fill="#A9C0CA" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13">text → token IDs</text>
  </g>

  <path d="M472 195H508" stroke="#3A6576" stroke-width="3"/>
  <path d="M500 188L508 195L500 202" fill="none" stroke="#3A6576" stroke-width="3"/>

  <g id="models" transform="translate(508 120)">
    <rect width="210" height="150" rx="14" fill="#0E202A" stroke="#2B5364" stroke-width="2"/>
    <text x="20" y="31" fill="#7895A4" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12" letter-spacing="1">03 / SELECT</text>
    <rect x="20" y="48" width="170" height="36" rx="8" fill="#102B37" stroke="#347083"/>
    <circle cx="38" cy="66" r="5" fill="#5EE1F2"/>
    <text x="52" y="72" fill="#DDF8FB" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14" font-weight="700">KOKORO 82M</text>
    <rect x="20" y="95" width="170" height="36" rx="8" fill="#2A2417" stroke="#6D5830"/>
    <circle cx="38" cy="113" r="5" fill="#FFBF5B"/>
    <text x="52" y="119" fill="#F5E5C4" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14" font-weight="700">KITTEN 15–80M</text>
  </g>

  <path d="M718 195H754" stroke="#3A6576" stroke-width="3"/>
  <path d="M746 188L754 195L746 202" fill="none" stroke="#3A6576" stroke-width="3"/>

  <g id="runtime" transform="translate(754 137)">
    <rect width="170" height="116" rx="14" fill="#0E202A" stroke="#2B5364" stroke-width="2"/>
    <text x="20" y="31" fill="#7895A4" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12" letter-spacing="1">04 / RUN</text>
    <text x="20" y="66" fill="#F5FAFC" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="22" font-weight="650">Local ONNX</text>
    <text x="20" y="94" fill="#A9C0CA" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13">no cloud request</text>
  </g>

  <path d="M924 195H960" stroke="#3A6576" stroke-width="3"/>
  <path d="M952 188L960 195L952 202" fill="none" stroke="#3A6576" stroke-width="3"/>

  <g id="output" transform="translate(960 137)">
    <rect width="184" height="116" rx="14" fill="#12252F" stroke="#5EE1F2" stroke-width="2"/>
    <text x="20" y="31" fill="#5EE1F2" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12" letter-spacing="1">05 / OUTPUT</text>
    <text x="20" y="66" fill="#F5FAFC" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="18" font-weight="650">PocketSpeechAudio</text>
    <text x="20" y="94" fill="#A9C0CA" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13">PCM16 · WAV · 24 kHz</text>
  </g>

  <g transform="translate(56 322)">
    <path d="M0 9H22L30 2L40 18L51 -6L64 22L76 0L87 9H112" fill="none" stroke="#5EE1F2" stroke-width="3" stroke-linecap="round"/>
    <text x="136" y="15" fill="#A9C0CA" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14">Model assets stay on the device. App code receives ordinary audio bytes.</text>
  </g>
</svg>
