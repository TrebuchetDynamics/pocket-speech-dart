name: pocket_speech
description: Offline speech synthesis for Flutter and Dart with local Kokoro and KittenTTS models.
version: 0.1.0
repository: https://github.com/TrebuchetDynamics/pocket-speech-dart
issue_tracker: https://github.com/TrebuchetDynamics/pocket-speech-dart/issues
topics:
  - kokoro
  - tts
  - flutter
  - offline
  - onnx
publish_to: none

environment:
  sdk: ^3.12.0
  flutter: '>=3.44.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_onnxruntime: ^1.8.0
  malsami: ^0.0.3
  path_provider: ^2.1.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter

flutter:
  assets:
    - assets/
    - test_assets/kokoro/
