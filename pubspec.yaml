name: kokorodart
description: Flutter/Dart wrapper for offline Kokoro TTS with optional local ONNX assets.
version: 0.1.0
repository: https://github.com/TrebuchetDynamics/kokorodart
issue_tracker: https://github.com/TrebuchetDynamics/kokorodart/issues
topics:
  - kokoro
  - tts
  - flutter
  - offline
  - onnx
publish_to: none

environment:
  sdk: ^3.12.0
  flutter: '>=3.44.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_onnxruntime: ^1.8.0
  malsami: ^0.0.3
  path_provider: ^2.1.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter

flutter:
  assets:
    - assets/
    - test_assets/kokoro/
